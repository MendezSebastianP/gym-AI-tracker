name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Docker Containers
        run: docker compose build

      - name: Start Database and API
        run: docker compose up -d postgres api

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          until curl -sf http://localhost:8000/docs > /dev/null 2>&1; do sleep 1; done
          echo "API is up!"

      - name: Run Backend Tests (Pytest)
        run: docker compose exec -T api pytest tests/ -v

      - name: Run Backend Linting (Flake8)
        run: docker compose exec -T api flake8 .

      - name: Run Frontend Type Check
        working-directory: ./frontend
        run: npm run type-check

      - name: Run Frontend Linting
        working-directory: ./frontend
        run: npm run lint
