# Production docker-compose — run on the mini PC
# Usage: docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# This overlays production-specific services on top of the base docker-compose.yml:
# - Caddy reverse proxy (auto HTTPS via Let's Encrypt)
# - Webhook listener (auto-deploy on push to main)

services:
  # Override frontend to not expose port directly (Caddy handles it)
  frontend:
    ports: []

  # Override API to not expose port directly
  api:
    ports: []

  # Caddy — reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    networks:
      - default

  # Webhook listener — receives GitHub webhooks and triggers deploy
  # Restricted Docker API proxy — only allows the calls needed by redeploy.sh
  dockerproxy:
    image: tecnativa/docker-socket-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Whitelist only what docker compose build/up/exec needs
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      POST: 1
      BUILD: 1
      EXEC: 1
      # Everything else off
      SWARM: 0
      AUTH: 0
      SECRETS: 0
      PLUGINS: 0
    networks:
      - agent_net

  webhook:
    image: gym-ai-tracker-webhook
    build:
      context: .
      dockerfile: deploy/Dockerfile.webhook
    restart: always
    depends_on:
      - dockerproxy
    # Port intentionally NOT exposed — Caddy proxies /hooks/* to webhook:9000 internally
    volumes:
      - ./deploy/hooks.json:/etc/webhook/hooks.json
      - ./deploy/redeploy.sh:/scripts/redeploy.sh
      # Docker socket removed — routed through restricted dockerproxy instead
      - .:/app
    working_dir: /app
    command: ["-verbose", "-hooks=/etc/webhook/hooks.json", "-hotreload"]
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - DOCKER_HOST=tcp://dockerproxy:2375
    networks:
      - default
      - agent_net

volumes:
  caddy_data:
  caddy_config:

networks:
  agent_net:
    driver: bridge
    internal: true  # Isolated — not reachable from internet
